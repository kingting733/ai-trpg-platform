<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Base atmosphere -->
    <radialGradient id="atmo" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#1c150d"/>
      <stop offset="45%" stop-color="#120e08"/>
      <stop offset="100%" stop-color="#0c0a07"/>
    </radialGradient>
    <!-- Warm glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6b3a1f" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6b3a1f" stop-opacity="0"/>
    </radialGradient>
    <!-- Gold ring stroke -->
    <linearGradient id="goldfade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0.12"/>
    </linearGradient>
    <!-- Bottom vignette to blend into page -->
    <linearGradient id="vig" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c0a07" stop-opacity="0"/>
      <stop offset="78%" stop-color="#0c0a07" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0c0a07" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="rightfade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0c0a07" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0c0a07" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="520" fill="url(#atmo)"/>
  <ellipse cx="520" cy="180" rx="520" ry="320" fill="url(#glow)"/>

  <!-- ░░ Occult ritual circle (center-left, behind title) ░░ -->
  <g transform="translate(430,250)" stroke="url(#goldfade)" fill="none" opacity="0.7">
    <circle r="230" stroke-width="1.2"/>
    <circle r="205" stroke-width="0.6"/>
    <circle r="150" stroke-width="1"/>
    <circle r="120" stroke-width="0.6"/>
    <circle r="70" stroke-width="0.8"/>
    <!-- Inner pentagram-ish lines -->
    <g stroke-width="0.7" opacity="0.8">
      <path d="M0,-150 L130,75 L-130,75 Z"/>
      <path d="M0,150 L130,-75 L-130,-75 Z"/>
    </g>
    <!-- Tick marks around outer ring -->
    <g stroke-width="1" opacity="0.6">
      <line x1="0" y1="-230" x2="0" y2="-205"/>
      <line x1="0" y1="230" x2="0" y2="205"/>
      <line x1="-230" y1="0" x2="-205" y2="0"/>
      <line x1="230" y1="0" x2="205" y2="0"/>
      <line x1="163" y1="-163" x2="145" y2="-145"/>
      <line x1="-163" y1="-163" x2="-145" y2="-145"/>
      <line x1="163" y1="163" x2="145" y2="145"/>
      <line x1="-163" y1="163" x2="-145" y2="145"/>
    </g>
    <!-- Small runic dots -->
    <g fill="#c9a96e" stroke="none" opacity="0.35">
      <circle cx="0" cy="-188" r="2"/>
      <circle cx="188" cy="0" r="2"/>
      <circle cx="0" cy="188" r="2"/>
      <circle cx="-188" cy="0" r="2"/>
    </g>
  </g>

  <!-- ░░ City skyline silhouette (bottom) ░░ -->
  <g fill="#0a0805" opacity="0.92">
    <path d="M0,520 V400 h70 V360 h40 V410 h55 V330 h60 V300 h30 V350 h50 V410 h45 V280 h55 V250 h28 V300 h44 V380 h60 V340 h40 V420 h70 V370 h50 V310 h36 V360 h54 V410 h48 V290 h60 V255 h26 V305 h46 V390 h64 V350 h44 V420 H0 Z"/>
    <path d="M760,520 V360 h60 V410 h50 V320 h44 V290 h26 V340 h50 V400 h56 V300 h60 V270 h28 V320 h46 V390 h60 V350 h44 V420 h70 V370 h50 V330 h40 V380 h56 V410 h48 V300 h60 V265 h26 V315 h48 V400 h64 V360 h60 V420 h60 V520 Z"/>
  </g>
  <!-- Faint lit windows -->
  <g fill="#c9a96e" opacity="0.25">
    <rect x="120" y="380" width="3" height="6"/>
    <rect x="240" y="330" width="3" height="6"/>
    <rect x="245" y="350" width="3" height="6"/>
    <rect x="470" y="300" width="3" height="6"/>
    <rect x="640" y="350" width="3" height="6"/>
    <rect x="820" y="380" width="3" height="6"/>
    <rect x="900" y="320" width="3" height="6"/>
    <rect x="1080" y="290" width="3" height="6"/>
    <rect x="1085" y="310" width="3" height="6"/>
    <rect x="1260" y="350" width="3" height="6"/>
    <rect x="1420" y="320" width="3" height="6"/>
  </g>

  <!-- Drifting fog bands -->
  <g fill="#1a140d" opacity="0.4">
    <ellipse cx="400" cy="430" rx="500" ry="40"/>
    <ellipse cx="1100" cy="450" rx="600" ry="35"/>
  </g>

  <!-- Overlays to blend with page -->
  <rect width="1600" height="520" fill="url(#vig)"/>
  <rect width="1600" height="520" fill="url(#rightfade)"/>
</svg>
